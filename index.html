<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizer Registration</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
    color: #ffffff;
    font-family: 'Segoe UI', Arial, sans-serif;
    box-sizing: border-box;
  }

  /* Full viewport setup to align everything cleanly */
  .page-wrapper {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    box-sizing: border-box;
  }

  .form-layout {
    width: 100%;
    max-width: 750px; /* Aligns with perfect readability width */
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .field-block {
    display: flex;
    flex-direction: column;
    width: 100%;
  }

  .field-block label {
    color: #ff3333;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
    padding-left: 2px;
  }

  /* Input fields stretching entirely from left to right */
  .field-block input {
    width: 100%;
    box-sizing: border-box;
    padding: 16px 20px;
    font-size: 18px;
    background: linear-gradient(135deg, #1f0505 0%, #0d0000 100%);
    border: 1px solid #400000;
    border-radius: 8px;
    color: #ffffff;
    outline: none;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  .field-block input:focus {
    border-color: #ff3333;
    box-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
  }

  /* Centered Action Button Structure */
  .btn-container {
    display: flex;
    justify-content: center;
    width: 100%;
    margin-top: 10px;
  }

  #submit-quizer-btn {
    padding: 16px 50px;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    background-color: #ff3333;
    color: #ffffff;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255, 51, 51, 0.3);
    transition: all 0.2s ease;
  }

  #submit-quizer-btn:hover {
    background-color: #cc0000;
    box-shadow: 0 4px 25px rgba(255, 51, 51, 0.6);
    transform: scale(1.02);
  }

  #submit-quizer-btn:active {
    transform: scale(0.98);
  }
</style>
</head>
<body>

<div class="page-wrapper">
  <div class="form-layout">
    
    <div class="field-block">
      <label for="regName">Name</label>
      <input type="text" id="regName" placeholder="Enter your name" autocomplete="off" required>
    </div>

    <div class="field-block">
      <label for="regSurname">Surname</label>
      <input type="text" id="regSurname" placeholder="Enter your surname" autocomplete="off" required>
    </div>

    <div class="btn-container">
      <button id="submit-quizer-btn">Submit Details</button>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcCjs7M6vFbJzLvYvZfddmEIsCzPPG3jE",
    authDomain: "quizer-project.firebaseapp.com",
    databaseURL: "https://quizer-project-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "quizer-project",
    storageBucket: "quizer-project.firebasestorage.app",
    messagingSenderId: "401652926555",
    appId: "1:401652926555:web:09e9b859638facefcd577e",
    measurementId: "G-D1D4LK2XRT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  let loggedInUid = null;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      loggedInUid = user.uid;
    } else {
      location.href = "index.html";
    }
  });

  document.getElementById('submit-quizer-btn').onclick = async function() {
    const inputName = document.getElementById('regName').value.trim();
    const inputSurname = document.getElementById('regSurname').value.trim();

    if (!inputName || !inputSurname) {
      alert("Please enter both your name and surname to update your details.");
      return;
    }

    if (!loggedInUid) {
      alert("Authentication state missing. Please refresh and log in again.");
      return;
    }

    try {
      // Committing the registration record safely to the users node
      await set(ref(db, "users/" + loggedInUid), {
        name: inputName,
        surname: inputSurname,
        timestamp: Date.now()
      });

      // Redirecting straight to quizer view
      location.href = "quizer.html";

    } catch (error) {
      console.error("Database initialization fault: ", error);
      alert("Something went wrong with the entry data transmission.");
    }
  };
</script>
</body>
</html>
